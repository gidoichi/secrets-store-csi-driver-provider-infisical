name: Test
on: push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/build-push-action@v7
        with:
          push: false

  go-test:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.runtime }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          set -eux
          go build -v ./...
          (cd admission-webhook && go build -v ./...)
      - name: Test
        run: |
          set -eux
          go test -v ./...
          (cd admission-webhook && go test -v ./...)
      - name: Version
        id: version
        run: |
          set -x
          printf 'runtime=%s' "$(go run main.go --version)" >> "$GITHUB_OUTPUT"

  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - run: terraform init
        working-directory: github
      - run: terraform plan -detailed-exitcode -refresh=false
        working-directory: github
        env:
          TF_VAR_GITHUB_TOKEN: ""

  updated-helm-chart-index:
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - name: Diff charts/index.yaml
        working-directory: charts
        env:
          PROVIDER_VERSION: ${{ needs.go-test.outputs.version }}
        run: |
          set -eux
          helm package secrets-store-csi-driver-provider-infisical
          for file in *.tgz; do mv {,chart-}"$file"; done
          yq '.generated = null | .entries[][].digest = null | .entries[][].created = null' index.yaml > index.yaml.a
          helm repo index . --merge index.yaml --url "https://github.com/gidoichi/secrets-store-csi-driver-provider-infisical/releases/download/v${PROVIDER_VERSION}/"
          yq '.generated = null | .entries[][].digest = null | .entries[][].created = null' index.yaml > index.yaml.b

          diff index.yaml.{a,b}

  validate-helm-chart:
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v6
      - name: Match provider version
        uses: mikefarah/yq@v4.53.3
        env:
          PROVIDER_VERSION: ${{ needs.go-test.outputs.version }}
        with:
          cmd: |
            file="charts/secrets-store-csi-driver-provider-infisical/Chart.yaml"
            diff <(yq --prettyPrint "$file") <(yq --prettyPrint '.appVersion = strenv(PROVIDER_VERSION)' "$file") >&2

  validate-deployment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5.0.0
      - name: Update kuberenetes manifest
        run: |
          make deployment
          git diff --exit-code

  publish-container:
    uses: ./.github/workflows/publish-container.yml
    secrets: inherit

  test-mount:
    needs: publish-container
    uses: ./.github/workflows/test-mount.yml
    secrets: inherit
    with:
      image-tag: _@${{ needs.publish-container.outputs.digest }}

  test-sync:
    needs: publish-container
    uses: ./.github/workflows/test-sync.yml
    secrets: inherit
    with:
      image-tag: _@${{ needs.publish-container.outputs.digest }}

  test-multiple:
    needs: publish-container
    uses: ./.github/workflows/test-multiple.yml
    secrets: inherit
    with:
      image-tag: _@${{ needs.publish-container.outputs.digest }}

  test-namespaced:
    needs: publish-container
    uses: ./.github/workflows/test-namespaced.yml
    secrets: inherit
    with:
      image-tag: _@${{ needs.publish-container.outputs.digest }}

  test-namespaced-neg:
    needs: publish-container
    uses: ./.github/workflows/test-namespaced-neg.yml
    secrets: inherit
    with:
      image-tag: _@${{ needs.publish-container.outputs.digest }}

  test-rotate:
    needs: publish-container
    uses: ./.github/workflows/test-rotate.yml

  test-filtered:
    needs: publish-container
    uses: ./.github/workflows/test-filtered.yml

  test-windows:
    needs: publish-container
    uses: ./.github/workflows/test-windows.yml
