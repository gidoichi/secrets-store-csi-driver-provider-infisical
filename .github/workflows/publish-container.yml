name: Publish Container
on:
  pull_request:
  workflow_call:
    inputs:
      tag:
        required: false
        type: string
    outputs:
      digest:
        value: ${{ jobs.publish.outputs.digest }}
  workflow_dispatch:
    inputs:
      tag:
        required: false
        type: string
jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: dockerhub
      url: https://hub.docker.com/r/${{ github.repository }}/${{ github.ref_name }}/images/sha256-${{ steps.sha256.outputs.digest }}
    outputs:
      digest: ${{ steps.docker.outputs.digest }}
    steps:
      - uses: docker/login-action@v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        id: docker
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ inputs.tag != '' && format('{0}:{1}', github.repository, inputs.tag) || '' }}
            ${{ github.repository }}:latest
      - id: sha256
        env:
          digest: ${{ steps.docker.outputs.digest }}
        run: echo "digest=${digest#sha256:}" >> "$GITHUB_OUTPUT"
